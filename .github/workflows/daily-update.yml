name: Daily Macro Update

on:
  schedule:
    # 每天北京时间 09:00（UTC 01:00）触发
    # 选择 9 点是因为统计局/央行的多数月度数据在 9-10 点发布
    - cron: '0 1 * * *'
  workflow_dispatch:   # 支持手动触发

# 给 workflow 写权限以便 commit 数据 + 部署 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 同一时刻只跑一个，避免重复
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      html_path: ${{ steps.run.outputs.html_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: run
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
          GLM_API_BASE: ${{ secrets.GLM_API_BASE }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m src.pipeline
          echo "html_path=output/index.html" >> $GITHUB_OUTPUT

      - name: Commit updated data + report
        run: |
          git add data/macro.db data/latest.json output/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
